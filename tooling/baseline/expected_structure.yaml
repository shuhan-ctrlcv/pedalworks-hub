# PedalWorks expected_structure (v2) — ground truth for kb-test-eval-v2.
# Derived DIRECTLY from kb-test-tooling/target_graph.yaml (Phase 2, Task 5):
# entities: and edges: below are byte-for-byte the same set as the target graph
# (same names/kinds/tiers/parents/attrs, same from/type/to/tier edges) — no drift.
# by_tier is a convenience index (entity names grouped per tier); it is not part
# of the canonical entity/edge set and carries no independent truth.
# This is the "one nested set -> three views" ground truth: entities+edges is the
# nested set, and (tier-0/1/2, by_tier, and the graph itself) are views over it.

# ---------------------------------------------------------------------------
# LIMITATIONS — what this file can and cannot be used to check:
#  * RECALL, not precision. The structure check verifies that expected
#    entities/edges are PRESENT in an extraction. It does NOT bound extra /
#    junk entities the extractor may invent (precision). A pass here does NOT
#    mean the extracted graph is clean.
#  * OVERLAY FIELDS are not extractor-comparable. `tier` and `parent` are our
#    visualization overlay; `kind` and edge `type` (verb) are our vocabulary.
#    The current flat engine emits none of these as-is, so they are NOT
#    directly comparable to extractor output.
#  * ALIASES are a spelling aid only. `aliases:` are source-grounded, human-
#    curated surface-form variants of an entity's name. They never change WHICH
#    facts are required. Aliases are NOT auto-enriched from extraction output
#    (that would let the system-under-test edit its own answer key); at most, a
#    run may surface candidate variants for a human to review and add by hand.
#  * CANONICAL HOME. This file is HAND-MAINTAINED. The one-off
#    target_graph -> expected_structure derivation is RETIRED; do not
#    regenerate this file (regeneration would wipe hand-curated aliases).
#    Entity/edge NAME sets stay in sync with target_graph.yaml via
#    tests/test_expected_structure.py.
# ---------------------------------------------------------------------------

